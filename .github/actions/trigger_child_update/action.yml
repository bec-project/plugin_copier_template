name: "Trigger update pipeline"
description: "Call a workflow"
inputs:
  REPO_NAME:
    required: true
    description: "Identifier of the repo in which to trigger an update"


runs:
  using: "composite"
  steps:
    - name: create update in child repo
      shell: bash
      run: |
        curl -X 'POST' \
        "https://gitea.psi.ch/api/v1/repos/bec/${{ inputs.REPO_NAME }}/actions/workflows/create_update_pr.yml/dispatches" \
        -H "Authorization: token ${{ secrets.CI_GITEA_WORKFLOW }}" \
        -H "Content-Type: application/json" \
        -d "{
          \"ref\": \"refs/heads/main\"
        }"